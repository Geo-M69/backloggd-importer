<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hollow Knight - Backloggd</title>
</head>
<body>
  <nav>
    <a href="/games/add">+ Log a Game</a>
  </nav>
  <main>
    <h1 hidden>Log a Game</h1>
    <h1>Hollow Knight</h1>

    <section class="game-status-buttons">
      <div class="played-btn-container btn-play-fill col px-0 mt-auto" hidden>
        <button type="button" class="button-link btn-play mx-auto">Played</button>
      </div>
      <div class="playing-btn-container col px-0 mt-auto">
        <button type="button" class="button-link btn-play mx-auto">Playing</button>
      </div>
      <div class="backlog-btn-container col px-0 mt-auto">
        <button type="button" class="button-link btn-play mx-auto">Backlog</button>
      </div>
      <div class="wishlist-btn-container col px-0 mt-auto">
        <button type="button" class="button-link btn-play mx-auto">Wishlist</button>
      </div>
    </section>
  </main>
</body>
</html>
