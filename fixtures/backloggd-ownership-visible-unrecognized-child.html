<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portal 2 - Backloggd</title>
</head>
<body>
  <main>
    <h1>Portal 2</h1>

    <section id="library" data-testid="library" aria-label="Library">
      <h2>Library</h2>
      <!-- Recognized list with a visible child that is NOT a recognized
           ownership row.  The reader must NOT declare the list empty. -->
      <ul role="list" data-testid="ownership-entries" aria-label="Ownership entries">
        <li>Steam / Digital</li>
      </ul>
      <button type="button" data-testid="add-ownership" class="add-ownership">Add Ownership</button>
    </section>
  </main>
</body>
</html>
