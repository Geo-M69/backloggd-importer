<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Half-Life 2 - Backloggd</title>
</head>
<body>
  <main>
    <h1>Half-Life 2</h1>

    <section id="library" data-testid="library" aria-label="Library">
      <h2>Library</h2>
      <!-- Recognized list whose only children are HIDDEN.  The reader must
           still treat this as a proven empty list (the hidden content
           does not count as visible). -->
      <ul role="list" data-testid="ownership-entries" aria-label="Ownership entries">
        <li style="display:none">Steam / Digital</li>
      </ul>
      <button type="button" data-testid="add-ownership" class="add-ownership">Add Ownership</button>
    </section>
  </main>
</body>
</html>
