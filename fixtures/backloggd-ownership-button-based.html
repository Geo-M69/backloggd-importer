<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Legend of Zelda: Breath of the Wild - Backloggd</title>
</head>
<body>
  <nav>
    <a href="/games/add">+ Log a Game</a>
  </nav>
  <main>
    <!-- Hidden heading that must be ignored for title verification -->
    <h1 hidden>Log a Game</h1>
    <!-- Visible game title -->
    <h1>The Legend of Zelda: Breath of the Wild</h1>

    <!-- Backloggd button-based status controls (no library region) -->
    <section class="game-status-buttons">
      <button type="button" class="status-btn status-active" aria-pressed="true">Played</button>
      <button type="button" class="status-btn" aria-pressed="false">Playing</button>
      <button type="button" class="status-btn" aria-pressed="false">Backlog</button>
      <button type="button" class="status-btn" aria-pressed="false">Wishlist</button>
    </section>

    <!-- "Mark as unplayed" appears when a status is set -->
    <section class="unplayed-section">
      <button type="button" class="mark-unplayed">Mark as unplayed</button>
    </section>
  </main>
</body>
</html>
