<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Save Editor XHR and Fetch - Backloggd</title>
</head>
<body>
  <main>
    <h1>Save Editor XHR and Fetch Test Game</h1>

    <!-- Library section with non-Steam entries (change needed) -->
    <section id="library" data-testid="library" aria-label="Library">
      <h2>Library</h2>
      <ul role="list" data-testid="ownership-entries" aria-label="Ownership entries">
        <li role="listitem" class="ownership-entry" data-testid="ownership-entry">
          <span data-field="platform">PlayStation</span>
          <span data-field="ownership">Physical</span>
        </li>
      </ul>

      <!-- Safe opener: Add Ownership -->
      <button type="button" id="add-ownership-btn" data-testid="add-ownership"
              class="add-ownership">Add Ownership</button>

      <!-- Editor modal (hidden by default) -->
      <div id="ownership-editor" class="modal" style="display: none;" role="dialog" aria-label="Add Ownership">
        <div class="field">
          <label for="platform-select">Platform</label>
          <select id="platform-select" name="platform" aria-label="Platform">
            <option value="">Select platform...</option>
            <option value="Steam">Steam</option>
            <option value="PlayStation">PlayStation</option>
            <option value="Xbox">Xbox</option>
          </select>
        </div>
        <div class="field">
          <label for="ownership-select">Ownership</label>
          <select id="ownership-select" name="ownership_type" aria-label="Ownership">
            <option value="">Select ownership...</option>
            <option value="Owned">Owned</option>
            <option value="Digital">Digital</option>
            <option value="Physical">Physical</option>
          </select>
        </div>

        <!-- Only Save button inside the editor (no other final actions) -->
        <button type="button" id="save-btn">Save</button>

        <!-- Cancel (safe to click) -->
        <button type="button" id="cancel-btn">Cancel</button>
      </div>
    </section>

    <script>
      // Finding 2 regression fixture:
      //   * Save click handler fires an XHR POST to /api/library/.
      //   * It ALSO fires a fetch POST to /api/library/.
      //   * The page-side fetch audit only tracks the fetch POST.
      //   * Playwright sees BOTH requests.
      //   * The executor must reject because Playwright request count > 1,
      //     and because Playwright count does not match fetch audit count.

      window.__platformChangeCount = 0;
      window.__ownershipChangeCount = 0;
      window.__addOwnershipClickCount = 0;
      window.__saveClickCount = 0;
      window.__cancelClickCount = 0;
      window.__xhrSent = 0;
      window.__fetchSent = 0;
      window.__saveSuccess = false;

      // Opener: Add Ownership
      document.getElementById('add-ownership-btn').addEventListener('click', function() {
        window.__addOwnershipClickCount++;
        document.getElementById('ownership-editor').style.display = 'block';
      });

      // Save — fires both XHR and fetch matching POSTs.
      document.getElementById('save-btn').addEventListener('click', function() {
        window.__saveClickCount++;

        // Update library section to reflect the saved values
        updateOwnershipEntry();
        window.__saveSuccess = true;
        document.getElementById('ownership-editor').style.display = 'none';

        // XHR matching POST (NOT tracked by page-side fetch audit)
        window.__xhrSent++;
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://backloggd.com/api/library/', true);
        xhr.send();

        // Fetch matching POST (tracked by page-side fetch audit)
        window.__fetchSent++;
        fetch('https://backloggd.com/api/library/', { method: 'POST' }).catch(function() {});
      });

      // Cancel
      document.getElementById('cancel-btn').addEventListener('click', function() {
        window.__cancelClickCount++;
        document.getElementById('ownership-editor').style.display = 'none';
      });

      // Reflect select changes in the visible library section
      document.getElementById('platform-select').addEventListener('change', function() {
        window.__platformChangeCount++;
        updateOwnershipEntry();
      });
      document.getElementById('ownership-select').addEventListener('change', function() {
        window.__ownershipChangeCount++;
        updateOwnershipEntry();
      });

      // Update ownership entry to reflect current select values
      function updateOwnershipEntry() {
        var platform = document.getElementById('platform-select').value;
        var ownership = document.getElementById('ownership-select').value;
        var list = document.querySelector('[data-testid="ownership-entries"]');

        if (!platform || !ownership) return;

        var entries = list.querySelectorAll('.ownership-entry');
        var found = false;
        for (var i = 0; i < entries.length; i++) {
          var pf = entries[i].querySelector('[data-field="platform"]');
          if (pf && pf.textContent.trim() === platform) {
            var of = entries[i].querySelector('[data-field="ownership"]');
            if (of) of.textContent = ownership;
            found = true;
            break;
          }
        }
        if (!found) {
          var li = document.createElement('li');
          li.setAttribute('role', 'listitem');
          li.className = 'ownership-entry';
          li.setAttribute('data-testid', 'ownership-entry');
          li.innerHTML = '<span data-field="platform">' + platform + '</span>' +
                         '<span data-field="ownership">' + ownership + '</span>';
          list.appendChild(li);
        }
      }
    </script>
  </main>
</body>
</html>
