<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team Fortress 2 - Backloggd</title>
</head>
<body>
  <main>
    <h1>Team Fortress 2</h1>

    <section id="library" data-testid="library" aria-label="Library">
      <h2>Library</h2>
      <ul role="list" data-testid="ownership-entries" aria-label="Ownership entries">
        <li role="listitem" class="ownership-entry" data-testid="ownership-entry">
          <textarea data-field="platform" aria-label="Platform">Steam</textarea>
          <span data-field="ownership">Digital</span>
        </li>
      </ul>
      <button type="button" data-testid="add-ownership" class="add-ownership">Add Ownership</button>
    </section>
  </main>
</body>
</html>
